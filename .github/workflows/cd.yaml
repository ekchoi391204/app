name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  update-helm-repo:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: ekchoi391204/app-helm
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          # 1. 커밋 메시지 추출 및 확인
          RAW_MSG="${{ github.event.workflow_run.head_commit.message }}"
          # 메시지가 비어있을 경우를 대비해 'latest' 등 기본값 설정 가능
          SAFE_TAG=$(echo "$RAW_MSG" | tr -dc '[:alnum:]' | cut -c1-50)
          
          if [ -z "$SAFE_TAG" ]; then SAFE_TAG="latest"; fi
          echo "Extracted Tag: $SAFE_TAG"

          TARGET_FILE="charts/myapp/values.yaml"

          # 2. 파일 수정 전 내용 확인 (디버깅용)
          echo "--- Before Update ---"
          cat "$TARGET_FILE"
          
          # 3. sed 명령어 개선 (공백 대응 및 정확한 매칭)
          # 'tag:'로 시작하는 라인 전체를 '  tag: SAFE_TAG'로 교체
          sed -i "s/^[[:space:]]*tag:.*/  tag: ${SAFE_TAG}/g" "$TARGET_FILE"

          # 4. 파일 수정 후 내용 확인 (디버깅용)
          echo "--- After Update ---"
          cat "$TARGET_FILE"

      - name: Commit and push changes
        run: |
          git config --global user.name "ekchoi391204"
          git config --global user.email "ekchoi391204@gmail.com"
          
          git add charts/myapp/values.yaml
          
          # 변경사항 확인 로그
          git status
          
          if git diff --staged --quiet; then
            echo "No changes detected in values.yaml. Check if sed matched the pattern."
          else
            git commit -m "chore: update image tag to ${{ github.event.workflow_run.head_commit.id }} [skip ci]"
            git push origin main
          fi