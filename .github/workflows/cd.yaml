name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  update-helm-repo:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # 1. Helm 매니페스트 레포지토리 체크아웃 (PAT 사용)
      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: ekchoi391204/app-helm
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      # 2. 커밋 메시지 정제 및 values.yaml 업데이트
      - name: Update image tag in values.yaml
        run: |
          # CI를 트리거한 원본 커밋 메시지에서 안전한 태그 추출
          RAW_MSG="${{ github.event.workflow_run.head_commit.message }}"
          SAFE_TAG=$(echo "$RAW_MSG" | tr -dc '[:alnum:]' | cut -c1-50)
          
          echo "Updating Helm tag to: $SAFE_TAG"
          
          # 정확한 파일 경로 설정
          TARGET_FILE="charts/myapp/values.yaml"
          
          if [ -f "$TARGET_FILE" ]; then
            # 'tag: ' 부분을 찾아 업데이트
            sed -i "s/tag: .*/tag: ${SAFE_TAG}/g" "$TARGET_FILE"
            echo "Successfully updated $TARGET_FILE"
          else
            echo "Error: $TARGET_FILE not found!"
            find . -name "values.yaml" # 경로 확인을 위한 디버깅용
            exit 1
          fi

      # 3. Git 설정 및 푸시
      - name: Commit and push changes
        run: |
          git config --global user.name "ekchoi391204"
          git config --global user.email "ekchoi391204@gmail.com"
          
          # 수정된 파일 경로를 명확히 추가
          git add charts/myapp/values.yaml
          
          # 변경사항이 있는 경우에만 커밋 및 푸시 진행
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update image tag to $SAFE_TAG [skip ci]"
            git push origin main
          fi