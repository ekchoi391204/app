name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  update-helm-repo:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # 1. Helm 매니페스트 레포지토리 체크아웃
      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: ekchoi391204/app-helm
          ref: main
          token: ${{ secrets.TOKEN }} # GitHub Personal Access Token(PAT) 필요

      # 2. 커밋 메시지 정제 및 values.yaml 업데이트
      - name: Update image tag in values.yaml
        run: |
          # CI 워크플로우를 발생시킨 원본 커밋 메시지 추출
          RAW_MSG="${{ github.event.workflow_run.head_commit.message }}"
          SAFE_TAG=$(echo "$RAW_MSG" | tr -dc '[:alnum:]' | cut -c1-50)
          
          echo "Updating Helm tag to: $SAFE_TAG"
          
          # yq가 설치된 환경이므로 yq를 사용하는 것이 가장 안전합니다.
          # 만약 yq가 없다면 아래 sed 또는 awk 명령어를 사용하세요.
          sed -i "s/tag: .*/tag: ${SAFE_TAG}/g" values.yaml

      # 3. Git 설정 및 푸시
      - name: Commit and push changes
        run: |
          git config --global user.name "ekchoi391204"
          git config --global user.email "ekchoi391204@gmail.com"
          
          git add values.yaml
          git commit -m "chore: update image tag to ${{ github.event.workflow_run.head_commit.id }} [skip ci]" || echo "No changes to commit"
          git push origin main