name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/*'  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 커밋 메시지에서 태그 추출 (특수문자 제거 및 길이 제한)
      - name: Get Commit Message for Tag
        id: vars
        run: |
          RAW_MSG=$(git log -1 --pretty=%B | tr -d '\n' | sed 's/[^a-zA-Z0-9]/_/g' | cut -c1-50)
          echo "COMMIT_TAG=${RAW_MSG}" >> $GITHUB_ENV

      # 2. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. 이미지 빌드 및 푸시 (레포지토리: app)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app:${{ env.COMMIT_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/app:latest

      # # 4. AWS 자격 증명 설정
